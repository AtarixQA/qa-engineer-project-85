- summary: |
    Проверка возможности одновременного решения одной задачи двумя пользователями (режим 1v1)
  requirement: |
    Система должна позволять двум пользователям одновременно решать одну задачу.
  prerequisites: |
    1. Создана игровая комната 1v1 для Игрока_1 и Игрока_2.
    2. Оба игрока находятся на странице этой игры (Arena).
    3. Статус игры — «Timeout in».
  test-data: |
    Игрок 1: Пользователь A
    Игрок 2: Пользователь B
  steps:
    - Игрок 1 начинает вводить любой код в своем окне редактора.
    - Игрок 2 одновременно с Игроком 1 начинает вводить код в своем окне редактора.
    - Оба игрока нажимают кнопку «Run» для запуска тестов.
  expected-result: |
    Оба пользователя могут одновременно редактировать код и запускать проверку. Действия одного игрока не блокируют работу и не отображаются в редакторе другого игрока.

- summary: |
    Проверка синхронного отображения кода оппонента в режиме реального времени
  requirement: |
    Система должна обеспечивать синхронное отображение кода оппонента в режиме реального времени.
  prerequisites: |
    1. Создан бой 1v1 между Игроком_1 и Игроком_2.
    2. Оба игрока находятся в Арене.
  test-data: |
    Текст в редакторе: "const solution = () => 42;"
  steps:
    - Игрок_1 начинает вводить код в своем редакторе.
    - Игрок_2 наблюдает за окном Игрока_1 на своем экране.
  expected-result: |
    Код, вводимый Игроком_1, отображается в окне оппонента у Игрока_2 мгновенно (с минимальной задержкой через WebSocket).

- summary: |
    Смена языка программирования во время боя
  requirement: |
    Пользователь должен иметь возможность сменить язык программирования в любой момент боя.
  prerequisites: |
    Запущен бой, открыт редактор кода.
  test-data: |
    Языки: Java -> Python
  steps:
    - Нажать на выпадающий список выбора языков в редакторе.
    - Выбрать другой язык (например, Python).
  expected-result: |
    1. Синтаксис в редакторе меняется на Python.
    2. Код обновляется под выбранный язык.
    3. При нажатии «Run» тесты запускаются именно для Python.


