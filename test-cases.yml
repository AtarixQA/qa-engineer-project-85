---
- summary: |
    Проверка возможности одновременного решения одной задачи двумя пользователями (режим 1v1)
  requirement: |
    Система должна позволять двум пользователям одновременно решать одну задачу
  prerequisites: |
    Создана игровая комната 1v1 для Игрока_1 и Игрока_2
    Оба игрока находятся на странице этой игры (Arena)
    Статус игры — Timeout in
  test-data: |
    Игрок 1 Пользователь A
    Игрок 2 Пользователь B
  steps:
    - Игрок 1 начинает вводить любой код в своем окне редактора
    - Игрок 2 одновременно с Игроком 1 начинает вводить код в своем окне редактора
    - Оба игрока нажимают кнопку Run для запуска тестов
  expected-result: |
    Оба пользователя могут одновременно редактировать код и запускать проверку, действия одного игрока не блокируют работу и не отображаются в редакторе другого игрока

- summary: |
    Проверка синхронного отображения кода оппонента в режиме реального времени
  requirement: |
    Система должна обеспечивать синхронное отображение кода оппонента в режиме реального времени
  prerequisites: |
    Создан бой 1v1 между Игроком_1 и Игроком_2
    Оба игрока находятся в Арене
  test-data: |
    Текст в редакторе const solution = () => 42;
  steps:
    - Игрок_1 начинает вводить код в своем редакторе
    - Игрок_2 наблюдает за окном Игрока_1 на своем экране
  expected-result: |
    Код, вводимый Игроком_1, отображается в окне оппонента у Игрока_2 мгновенно (с минимальной задержкой через WebSocket)

- summary: |
    Проверка поведения системы при кратковременной потере интернета у игрока (негативный)
  requirement: |
    Система должна корректно восстанавливать состояние редактора и статус боя после переподключения
  prerequisites: |
    Запущен бой 1v1, Игрок_1 начал писать код
  test-data: |
    URL https://codebattle.hexlet.io/games/[game_id]
  steps:
    - Игрок_1 отключает интернет (имитация через Network tab в DevTools — Offline)
    - Игрок_1 вносит изменения в код в офлайн-режиме
    - Игрок_1 включает интернет
  expected-result: |
    Система отображает уведомление о потере связи
    После включения интернета происходит реконнект (WebSocket)
    Написанный в офлайне код синхронизируется с сервером и отображается у оппонента

- summary: |
    Проверка смены языка программирования во время боя
  requirement: |
    Пользователь должен иметь возможность сменить язык программирования в любой момент боя
  prerequisites: |
    Запущен бой, открыт редактор кода
  test-data: |
    Языки Java -> Python
  steps:
    - Нажать на выпадающий список выбора языков в редакторе
    - Выбрать другой язык (например, Python)
  expected-result: |
    Синтаксис в редакторе меняется на Python
    Код обновляется под выбранный язык
    При нажатии Run тесты запускаются именно для Python

- summary: |
    Проверка смены языка программирования в момент активной проверки (негативный)
  requirement: |
    Интерфейс должен блокировать смену языка или корректно прерывать текущую проверку при переключении
  prerequisites: |
    В редакторе написан код, нажата кнопка Run (идет процесс тестирования)
  test-data: |
    Языки Java -> Python
  steps:
    - Пока крутится лоадер проверки, быстро сменить язык в выпадающем списке
  expected-result: |
    Система блокирует переключатель до конца теста и очищает Output, подставляя шаблон нового языка
    Не должно возникнуть ситуации, когда тесты от Java приходят в редактор Python

- summary: |
    Проверка создания игры с ботом и игры с другом по прямой ссылке
  requirement: |
    Система должна поддерживать игру с ботом и игру с другом по прямой ссылке
  prerequisites: |
    Пользователь авторизован в системе
  test-data: |
    URL https://codebattle.hexlet.io/games/[game_id]
  steps:
    - Создать игру в режиме With Bot
    - Создать игру в режиме With other user и скопировать прямую ссылку
    - Открыть ссылку во втором (инкогнито) окне под другим аккаунтом
  expected-result: |
    С ботом игра начинается мгновенно, бот имитирует написание кода
    По ссылке второй пользователь успешно входит в ту же игровую комнату

- summary: |
    Проверка входа в игру по невалидной или устаревшей ссылке (негативный)
  requirement: |
    Система должна выдавать понятную ошибку и перенаправлять пользователя, если игра не существует
  prerequisites: |
    Пользователь имеет ссылку на игру, которая уже завершилась или была удалена
  test-data: |
    URL https://codebattle.hexlet.io/games/invalid_id_999
  steps:
    - Вставить невалидную ссылку в адресную строку браузера и нажать Enter
  expected-result: |
    Пользователь видит страницу 404 или уведомление Game not found или Game is over
    Система предлагает вернуться в лобби или создать новую игру

- summary: |
    Проверка переключения языка описания задачи (RU/EN)
  requirement: |
    Задачи должны быть доступны на двух языках (RU/EN) с корректным переключением
  prerequisites: |
    Открыта Арена с задачей
  test-data: |
    Переключатель RU/EN
  steps:
    - Нажать на переключатель языка в блоке с описанием задачи
    - Сменить язык с EN на RU и обратно
  expected-result: |
    Текст условия задачи, названия входных/выходных параметров и примеры корректно переводятся на выбранный язык

- summary: |
    Проверка автоматического запуска тестов при вводе верного решения задачи "Square"
  requirement: |
    Система должна автоматически запускать тесты при нажатии кнопки Run и выводить статус Passed для корректного кода
  prerequisites: |
    В игровом зале Codebattle открыта задача "Square" (возведение числа в квадрат)
  test-data: |
    Язык: JavaScript
    Код: const solution = (num) => {
      return num * num;
    };
  steps:
    - Нажать кнопку Run над редактором
  expected-result: |
    Появляется индикация процесса тестирования, в панели Output отображается статус "Passed", список пройденных тестов и логи успешного выполнения

- summary: |
    Проверка автоматического запуска тестов при вводе неверного решения задачи "Square"
  requirement: |
    Система должна автоматически запускать тесты при нажатии кнопки Run и выводить статус Failed для некорректного кода
  prerequisites: |
    В игровом зале Codebattle открыта задача "Square" (возведение числа в квадрат)
  test-data: |
    Язык: JavaScript
    Код: const solution = (num) => {
      return num + num;
    };
  steps:
    - Нажать кнопку Run над редактором
  expected-result: |
    Появляется индикация процесса тестирования, в панели Output отображается статус "Failed", список упавших тестов с указанием ошибки и логи выполнения

- summary: |
    Проверка начисления очков и формирования рейтингов
  requirement: |
    Система должна начислять очки за победы и формировать рейтинги
  prerequisites: |
    Пользователь выигрывает игру
  test-data: |
    Вкладка STATISTICS
  steps:
    - Зафиксировать текущее количество очков в профиле
    - Выиграть бой
    - Перейти в раздел My Profile и проверить вкладку STATISTICS
  expected-result: |
    Очки за победу добавились в профиль
    Имя пользователя отображается в таблицах лидеров на соответствующих вкладках с обновленным счетом

- summary: |
    Проверка начисления очков при нажатии кнопки Give Up (негативный)
  requirement: |
    Система должна корректно завершать матч и штрафовать игрока/начислять очки оппоненту при сдаче
  prerequisites: |
    Запущен бой 1v1
  test-data: |
    Игрок_1, Игрок_2
  steps:
    - Игрок_1 нажимает кнопку Give Up или закрывает вкладку браузера в разгаре боя
  expected-result: |
    Игра мгновенно завершается
    Игроку_2 присуждается победа, Игроку_1 — поражение
    Очки в рейтинге пересчитываются согласно логике платформы

- summary: |
    Проверка просмотра записи игры через плеер-редактор в истории
  requirement: |
    Система должна сохранять историю игр и позволять просматривать их запись через плеер-редактор
  prerequisites: |
    В профиле пользователя есть завершенные игры
  test-data: |
    https://codebattle.hexlet.io/games/[game_id]
  steps:
    - Перейти в раздел COMPLETED GAMES в профиле
    - Выбрать завершенную игру и нажать Show
    - Нажать кнопку Play в открывшемся плеере
  expected-result: |
    Открывается редактор кода, в котором пошагово воспроизводится процесс написания кода обоими участниками (таймлайн работает)

- summary: |
    Проверка создания игры гостем
  requirement: |
    Система должна разрешать создание игры только авторизованным пользователям
  prerequisites: |
    Пользователь не авторизован (разлогинен)
  test-data: |
    https://codebattle.hexlet.io
  steps:
    - Перейти на главную страницу Codebattle
    - Нажать кнопку создания игры "Create a battle"
  expected-result: |
    Система скрывает все функции относящиеся к игре из-за отсутствия авторизации и выводить гостю страницу с содержанием платформы

- summary: |
    Проверка мгновенного появления новой игры в списке Join a battle
  requirement: |
    Созданная игра должна мгновенно появляться в списке доступных для других пользователей без перезагрузки страницы
  prerequisites: |
    Пользователь А открыл страницу списка игр
    Пользователь Б авторизован и готов создать игру
  test-data: |
    https://codebattle.hexlet.io
  steps:
    - Пользователь Б создает новую игру
    - Пользователь А наблюдает за списком игр, не обновляя страницу (F5 не нажимать)
  expected-result: |
    Новая игра от Пользователя Б появляется в списке у Пользователя А автоматически в течение 1-2 секунд

- summary: |
    Проверка доступности выбора языка программирования внутри игрового пространства
  requirement: |
    Выбор языка программирования должен быть доступен внутри игрового пространства, а не на этапе создания сессии
  prerequisites: |
    Игра создана, пользователь вошел в арену, на этапе создания язык не выбирался
  test-data: |
    https://codebattle.hexlet.io
  steps:
    - Внутри Арены нажать на селектор языков
    - Выбрать любой язык (например, Elixir)
  expected-result: |
    Список языков активен только внутри Арены
    После выбора происходит инициализация, в редакторе появляется шаблон кода для выбранного языка

- summary: |
    Проверка режима ожидания второго игрока
  requirement: |
    В системе должен быть режим ожидания второго игрока
  prerequisites: |
    Пользователь А авторизован и находится на странице создания игры
  test-data: |
    https://codebattle.hexlet.io
  steps:
    - Пользователь А создает игру (тип игры "With other user")
    - Пользователь А переходит в игровую Арену
  expected-result: |
    В интерфейсе отображается статус Waiting for opponent (или аналогичный)
    Таймер боя не запускается
    Редактор кода доступен для ввода, но сессия официально не считается начатой до входа соперника

- summary: |
    Проверка подключения второго игрока через специальную кнопку в списке игр
  requirement: |
    Второй игрок должен иметь возможность подключиться к активной сессии через специальную кнопку в списке игр
  prerequisites: |
    Пользователь А уже создал игру и ожидает в Арене
    Пользователь Б авторизован и открыл список доступных игр (Join a battle)
  test-data: |
    https://codebattle.hexlet.io
  steps:
    - Пользователь Б находит игру Пользователя А в списке
    - Пользователь Б нажимает кнопку Fight
  expected-result: |
    Пользователь Б мгновенно перенаправляется на страницу Арены этой игры
    У обоих игроков статус игры меняется на Timeout in
    Запускается игровой процесс (таймер, возможность отправки решения)

- summary: |
    Проверка наличия и расположения двух редакторов кода в Арене
  requirement: |
    В системе должно быть два редактора (слева - свой, справа - соперника)
  prerequisites: |
    Игра в статусе Timeout in, оба игрока в арене
  test-data: |
    https://codebattle.hexlet.io/games/[game_id]
  steps:
    - Визуально оценить интерфейс игрового поля
  expected-result: |
    Экран разделен на две основные части левая панель содержит активный редактор для текущего пользователя, правая панель отображает код соперника (Read-only)

- summary: |
    Проверка двусторонней синхронизации кода между игроками
  requirement: |
    Система должна обеспечивать двустороннюю синхронизацию кода через WebSockets или аналоги
  prerequisites: |
    Игрок А и Игрок Б находятся в одной игре
    У обоих открыты соответствующие редакторы
  test-data: |
    https://codebattle.hexlet.io/games/[game_id]
  steps:
    - Игрок А вводит строку кода const x = 10;
    - Игрок Б вводит строку кода print("Hello")
  expected-result: |
    Игрок Б видит изменения Игрока А в правой панели (редактор соперника) в реальном времени
    Игрок А видит изменения Игрока Б в своей правой панели в реальном времени
    Задержка отображения минимальна, текст не прыгает

- summary: |
    Проверка изоляции результатов теста (кнопка Run)
  requirement: |
    Кнопка Run должна запускать тесты только для кода текущего пользователя
  prerequisites: |
    Запущена игровая сессия с двумя игроками (Игрок А и Игрок Б)
  test-data: |
    Код Игрока А = корректный, Код Игрока Б = с ошибкой
  steps:
    - Игрок А нажимает кнопку Run
    - Проверяем состояние прогресса у Игрока Б
  expected-result: |
    Тесты запускаются только для Игрока А
    Результаты Игрока А никак не отражаются на прогресс-баре или статусе Игрока Б

- summary: |
    Проверка восстановления состояния редактора и текущего прогресса по ID сессии при обрыве соединения и обновления страницы (F5)
  requirement: |
    При обрыве соединения и обновлении страницы (F5) состояние редактора и текущий прогресс должны восстанавливаться по ID сессии
  prerequisites: |
    Игрок находится в активной игре, в редактор введен код
  test-data: |
    Код в редакторе const sum = (a, b) => a + b;
  steps:
    - Ввести код в редактор
    - Обновить страницу браузера (F5)
    - Проверить сохранение прогресса
    - Имитировать разрыв интернет-соединения на 10 секунд (DevTools)
    - Восстановить соединение
    - Проверить сохранение прогресса
  expected-result: |
    После перезагрузки и разрыва интернет-соединения в редакторе отображается тот же код, прогресс решения сохранен

- summary: |
    Проверка восстановления сессии с невалидным ID (негативный)
  requirement: |
    Состояние редактора восстанавливается только по корректному ID сессии
  prerequisites: |
    Игрок находится на странице игры
  test-data: |
    Подмена Session ID в LocalStorage/Cookie на несуществующий
  steps:
    - Изменить ID текущей сессии на рандомный набор символов 
    - Обновить страницу (F5)
  expected-result: |
    Система не восстанавливает старый код, пользователь перенаправляется на главную или видит пустой редактор новой сессии

- summary: |
    Проверка переподключения игрока после разрыва соединения
  requirement: |
    Игрок должен иметь возможность переподключиться к игре при разрыве соединения
  prerequisites: |
    Игрок находится в активной игровой сессии
  test-data: |
    ID сессии игрока
  steps:
    - Имитировать разрыв интернет-соединения на 10 секунд (DevTools)
    - Восстановить соединение
    - Дождаться автоматического реконнекта или обновить страницу
  expected-result: |
    Игрок успешно возвращается в ту же игровую комнату, сессия продолжается

- summary: |
    Проверка неограниченного количества попыток нажатия Run
  requirement: |
    Игрок имеет неограниченное количество попыток на проверку кода (кнопка Run)
  prerequisites: |
    Игрок находится в активной игре
  test-data: |
    Некорректный код в редакторе
  steps:
    - Нажать кнопку Run 10 и более раз подряд
  expected-result: |
    Кнопка Run остается активной, система каждый раз стабильно обрабатывает запрос и возвращает результат тестов

- summary: |
    Проверка отсутствия автоматического закрытия сессии при длительном бездействии
  requirement: |
    В игре не должно быть таймера на победу — игра идёт до первого успешного решения
  prerequisites: |
    Игроки зашли в игровую комнату
  test-data: |
    Время ожидания > 1 часа
  steps:
    - Запустить игровую сессию
    - Оставить окно браузера активным, но не предпринимать никаких действий в течение 1 часа
    - По истечении времени нажать кнопку Run с правильным решением
  expected-result: |
    Игра не прерывается по таймауту, кнопка Run остается доступной, автоматического поражения/победы не происходит

- summary: |
    Проверка логики завершения игры при первом успешном прохождении теста
  requirement: |
    При первом успешном прохождении тестов система должна заблокировать кнопку Run для победителя и вывести модальное окно уведомления для обоих игроков
  prerequisites: |
    Активная игра между двумя пользователями
  test-data: |
    Решение задачи, проходящее все тесты
  steps:
    - Игрок А вводит верное решение
    - Игрок А нажимает кнопку Run
  expected-result: |
    У Игрока А кнопка Run становится неактивной, у обоих игроков появляется модальное окно с уведомлением о победе Игрока А

- summary: |
    Проверка возможности редактирования кода проигравшим игроком
  requirement: |
    Проигравший должен иметь возможность продолжать редактирование и запуск тестов до момента нажатия кнопки Exit
  prerequisites: |
    Игра завершена (второй игрок уже решил задачу и стал победителем)
    Появилось модальное окно о завершении игры
  test-data: |
    Любой корректный или некорректный код
  steps:
    - Закрыть модальное окно уведомления (если оно перекрывает редактор)
    - Ввести новый код в редактор
    - Нажать кнопку Run
  expected-result: |
    Редактор доступен для ввода
    Тесты запускаются и возвращают результат
    Статус игры для этого пользователя не меняется на Победитель

- summary: |
    Проверка возможности победителя оставаться в сессии
  requirement: |
    Победитель должен иметь возможность остаться и смотреть на код
  prerequisites: |
    Игрок А победил в игре 
    Появилось модальное окно о победе
  test-data: |
    Не требуется
  steps:
    - Закрыть модальное окно уведомления
    - Находиться в комнате, не нажимая кнопку Exit
  expected-result: |
    Победитель остается в игровой комнате
    Виден свой код и (если предусмотрено интерфейсом) код соперника
    Перенаправления на главную страницу не происходит

- summary: |
    Проверка сохранения данных редактора до закрытия сессии
  requirement: |
    Данные должны храниться до полного завершения сессии
  prerequisites: |
    Игра завершена
    Оба игрока всё еще находятся в комнате
  test-data: |
    Код в редакторе проигравшего игрока
  steps:
    - Проигравший игрок обновляет страницу (F5)
  expected-result: |
    Состояние редактора, результаты последних тестов и статус Проигравший/Победитель восстанавливаются из памяти сервера

- summary: |
    Проверка удаления сессии после выхода обоих игроков
  requirement: |
    Сессия игры должна удаляться из активной памяти сервера (или помечаться как closed) только после того, как оба игрока нажали Exit или покинули страницу
  prerequisites: |
    Завершенная игра
    В комнате находятся Игрок А и Игрок Б
  test-data: |
    ID игровой сессии
  steps:
    - Игрок А нажимает Exit (или закрывает вкладку)
    - Игрок Б нажимает Exit (или закрывает вкладку)
    - Попытаться зайти в сессию по прямому URL
  expected-result: |
    После выхода первого игрока сессия остается активной для второго
    После выхода обоих игроков сессия помечается как closed или удаляется
    Прямой доступ к ней выдает ошибку 404 или редирект

- summary: |
    Проверка стабильности системы при нагрузке в 1000 одновременных пользователей 
  requirement: |
    Система должна стабильно обрабатывать до 1000 одновременных пользователей без деградации времени отклика
  prerequisites: |
    Наличие инструмента для нагрузочного тестирования (например, JMeter или k6)
    Сервер развернут в целевой конфигурации
  test-data: |
    1000 виртуальных пользователей, имитирующих активность (набор кода, отправка сообщений в чат)
  steps:
    - Запустить сценарий постепенного наращивания нагрузки до 1000 пользователей
    - Удерживать нагрузку в течение 15 минут
    - Замерить среднее время отклика для ключевых эндпоинтов
  expected-result: |
    Время отклика остается в пределах допустимых норм (например, < 500 мс для API), ошибок сервера (5xx) не зафиксировано

- summary: |
    Проверка поведения системы при превышении лимита пользователей (негативный)
  requirement: |
    Обработка до 1000 пользователей (проверка границы и деградации)
  prerequisites: |
    Стенд для нагрузочного тестирования
  test-data: |
    Нагрузка 1200+ одновременных пользователей
  steps:
    - Увеличить количество пользователей свыше 1000
    - Зафиксировать момент начала роста времени отклика или появления ошибок
  expected-result: |
    При превышении лимита система не должна "падать"
    Время отклика может увеличиться, но пользователи должны получать корректные ответы или сообщение о нагрузке

- summary: |
    Проверка задержки передачи кода между игроками
  requirement: |
    Задержка (latency) передачи изменений в коде между игроками не должна превышать 200–300 мс для комфортной игры
  prerequisites: |
    Две активные игровые сессии под разными аккаунтами
    Инструменты разработчика (Network tab) или логи сервера
  test-data: |
    Ввод строки кода function hello() {}
  steps:
    - Игрок А вводит символ в редакторе
    - Замерить время от момента отправки WebSocket-сообщения Игроком А до момента получения этого сообщения Игроком Б
  expected-result: |
    Разница во времени (latency) составляет не более 300 мс

- summary: |
    Проверка отображения изменений при искусственной задержке сети (негативный)
  requirement: |
    Комфортная игра при задержках
  prerequisites: |
    Использование Network Throttling в браузере (установка задержки 500+ мс)
  test-data: |
    Активная игра в режиме "Slow 3G" или кастомной задержки
  steps:
    - Установить задержку сети 500 мс
    - Попробовать быстро набирать код
  expected-result: |
    Код отображается с задержкой, но без "прыжков" курсора и без потери символов
    Интерфейс остается отзывчивым

- summary: |
    Проверка корректности работы функционала в браузерах
  requirement: |
    Сайт должен корректно работать в последних версиях браузеров (Chrome, Firefox, Safari, Edge)
  prerequisites: |
    Устройство на macOS или iOS с последней версией Safari, Chrome, Firefox, Edge
  test-data: |
    Тестовый аккаунт Codebattle
  steps:
    - Открыть главную страницу в Safari, Chrome, Firefox, Edge
    - Пройти авторизацию через GitHub/Google
    - Зайти в игровую комнату и нажать Run
  expected-result: |
    Все элементы UI отображаются без визуальных багов, кнопки активны, тесты запускаются и возвращают результат

- summary: |
    Проверка работы в неподдерживаемом или устаревшем браузере (негативный)
  requirement: |
    Корректная работа в актуальных версиях
  prerequisites: |
    Браузер Internet Explorer 11 или очень старая версия Chrome (например, v70)
  test-data: |
    https://codebattle.hexlet.io/
  steps:
    - Попробовать открыть сайт в устаревшем браузере
  expected-result: |
    Сайт либо отображается корректно (если есть полифиллы), либо выводит сообщение о том, что браузер не поддерживается и его нужно обновить

- summary: |
    Проверка отображения интерфейса на смартфоне 
  requirement: |
    Интерфейс должен быть адаптивным для корректного отображения на смартфонах и планшетах
  prerequisites: |
    Открыт браузер в режиме эмуляции мобильного устройства (например, iPhone 14 Pro Max, 430x932)
  test-data: |
    Разрешение экрана 430px по ширине
  steps:
    - Перейти на страницу игровой сессии
    - Проверить наличие всех ключевых элементов (задание, редактор, кнопка Run)
  expected-result: |
    Элементы перестроены под вертикальный вид
    Отсутствует горизонтальная прокрутка
    Текст задания читабелен

- summary: |
    Проверка верстки при экстремально малой ширине экрана (негативный)
  requirement: |
    Корректное отображение на мобильных устройствах
  prerequisites: |
    Использование DevTools
  test-data: |
    Ширина окна 280px (ультра-малые устройства)
  steps:
    - Уменьшить ширину окна до 280px
    - Попробовать нажать на кнопку Run
  expected-result: |
    Элементы интерфейса не накладываются друг на друга (каша из текста отсутствует)
    Кнопка Run остается доступной для нажатия

- summary: |
    Проверка использования защищенного протокола (HTTPS)
  requirement: |
    Система должна защищать персональные данные пользователей
  prerequisites: |
    Браузер с доступом к интернету
  test-data: |
    https://codebattle.hexlet.io/
  steps:
    - Ввести адрес сайта в адресную строку
    - Обратить внимание на иконку замка в строке браузера
  expected-result: |
    Установлено соединение по протоколу HTTPS
    Сертификат валиден

- summary: |
    Проверка визуального расположения основных блоков (Desktop)
  requirement: |
    Блок интерфейса задания должен быть сверху, время игры под ним, а чат слева
  prerequisites: |
    Десктопная версия сайта (1920x1080)
  test-data: |
    Активная игра https://codebattle.hexlet.io/games/[id game]
  steps:
    - Визуально оценить сетку интерфейса (Grid/Flex)
  expected-result: |
    Блок с описанием задачи находится в верхней части экрана
    Таймер расположен строго под блоком задачи
    Окно чата находится в левой вертикальной колонке

- summary: |
    Проверка поведения чата при отправке очень длинного сообщения (негативный)
  requirement: |
    Чат слева, корректное отображение
  prerequisites: |
    Открыто окно чата
  test-data: |
    Строка из 1000 символов без пробелов
  steps:
    - Вставить длинную строку в чат и отправить
  expected-result: |
    Текст сообщения переносится на новую строку или обрезается
    Чат не раздвигается вправо, не перекрывает редактор кода или задание

- summary: |
    Проверка отсутствия автоматического завершения игры по времени
  requirement: |
    Игра может длиться неограниченное время
  prerequisites: |
    Запущена игровая сессия
  test-data: |
    Длительность сессии 2 часа
  steps:
    - Оставить игровую сессию открытой на длительное время (например, на 2 часа)
    - Проверить статус игры по истечении времени
  expected-result: |
    Сессия остается активной
    Таймер продолжает отсчет (если предусмотрено) или зафиксирован
    Кнопка Run работает исправно

- summary: |
    Проверка сохранения прогресса кода при длительном простое (негативный)
  requirement: |
    Игра может длиться неограниченное время
  prerequisites: |
    Пользователь написал часть кода в редакторе
  test-data: |
    Простой в течение 60 минут
  steps:
    - Написать функцию в редакторе
    - Не совершать действий в течение часа
    - Обновить страницу F5
  expected-result: |
    Код пользователя сохранился в редакторе
    Сессия не закрыта по таймауту бездействия

- summary: |
    Проверка блокировки доступа к файловой системе сервера
  requirement: |
    Выполнение кода должно происходить в изолированной песочнице
  prerequisites: |
    Выбран язык программирования с доступом к системным библиотекам (например, Python)
  test-data: |
    Код
    import os
    print(os.listdir('/'))
  steps:
    - Вставить код в редактор
    - Нажать кнопку Run
  expected-result: |
    Система возвращает ошибку выполнения Runtime Error или Permission Denied
    Список файлов сервера не выводится

- summary: |
    Проверка ограничения ресурсов (CPU/RAM) в песочнице (негативный)
  requirement: |
    Исключение вредоносного воздействия на сервер (защита от бесконечных циклов)
  prerequisites: |
    Активная игровая сессия
  test-data: |
    Код (бесконечный цикл)
    while True: pass
  steps:
    - Вставить код в редактор
    - Нажать кнопку Run
  expected-result: |
    Система прерывает выполнение через заданный таймаут (например, 5 секунд) с сообщением "Execution Timeout"
    Сервер продолжает работать стабильно

- summary: |
    Проверка изоляции тестов от кода соперника
  requirement: |
    Тесты должны запускаться только на локальном коде, не на коде соперника
  prerequisites: |
    Игра между Игроком А и Игроком Б
    У Игрока Б написан заведомо неверный код
  test-data: |
    Игрок А пишет верное решение
  steps:
    - Игрок А нажимает кнопку Run
  expected-result: |
    Игрок А видит сообщение "All tests passed"
    Статус тестов Игрока Б не изменился и не повлиял на результат Игрока А

- summary: |
    Проверка времени обработки стандартной задачи
  requirement: |
    Время отклика сервера на нажатие кнопки Check (компиляция и прогон тестов) не должно превышать 2-3 секунд для стандартных задач
  prerequisites: |
    Стабильное сетевое соединение
  test-data: |
    Решение задачи средней сложности
  steps:
    - Нажать кнопку Run
    - Замерить время от клика до получения вердикта тестов
  expected-result: |
    Время обработки (включая компиляцию и прогон тестов) составляет менее 3 секунд

- summary: |
    Проверка синхронизации завершения игры для всех участников
  requirement: |
    Переходы между состояниями игры (active -> finished -> closed) должны быть атомарными и синхронизированными для всех участников (игроков и зрителей)
  prerequisites: |
    Игрок А, Игрок Б и Зритель С находятся в одной комнате
  test-data: |
    Игрок А отправляет финальное решение
  steps:
    - Игрок А нажимает Run и успешно проходит тесты
    - Наблюдать за интерфейсом Игрока Б и Зрителя С
  expected-result: |
    У всех участников одновременно отображается статус "Finished" и экран итогов
    Задержка между игроками не заметна визуально

- summary: |
    Проверка одновременного старта 100+ сессий
  requirement: |
    Система матчинга должна выдерживать одновременный старт 100+ игровых сессий без задержек в создании WebSocket-каналов
  prerequisites: |
    Инструмент автоматизации (например, скрипт на Playwright или JMeter)
  test-data: |
    200 виртуальных пользователей, одновременно нажимающих кнопку поиска игры
  steps:
    - Запустить массовый поиск игры для 200 пользователей
    - Проверить время создания игровых комнат и установки WebSocket-соединения
  expected-result: |
    Все 100 игровых пар сформированы
    Время создания канала для каждой пары не превышает установленной нормы (например, 1 секунда)
    Отсутствуют ошибки "Connection failed"
