---
functional:
  - Система должна позволять двум пользователям одновременно решать одну задачу.
  - Система должна обеспечивать синхронное отображение кода оппонента в режиме реального времени.
  - Пользователь должен иметь возможность сменить язык программирования в любой момент боя.
  - Система должна поддерживать игру с ботом и игру с другом по прямой ссылке.
  - Задачи должны быть доступны на двух языках (RU/EN) с корректным переключением.
  - Система должна автоматически запускать тесты при нажатии кнопки «Check» и выводить результат.
  - Зарегистрированные пользователи должны иметь доступ к чату.
  - Система должна начислять очки за победы и формировать рейтинги.
  - Система должна сохранять историю игр и позволять просматривать их запись через плеер-редактор.
  - Система должна разрешать создание игры только авторизованным пользователям.
  - Созданная игра должна мгновенно появляться в списке «доступных» для других пользователей без перезагрузки страницы.
  - Выбор языка программирования должен быть доступен внутри игрового пространства, а не на этапе создания сессии.
  - В системе должен быть режим ожидания второго игрока.
  - Второй игрок должен иметь возможность подключиться к активной сессии через специальную кнопку в списке игр.
  - В системе должно быть два редактора (слева - свой, справа - соперника).
  - Система должна обеспечивать двустороннюю синхронизацию кода через WebSockets или аналог.
  - Кнопка «Check» должна запускать тесты только для кода текущего пользователя. Результаты тестов соперника не должны влиять на прогресс игрока.
  - При обрыве соединения и обновлении страницы (F5) состояние редактора и текущий прогресс должны восстанавливаться по ID сессии.
  - Игрок должен иметь возможность переподключиться к игре при разрыве соединения.
  - Игрок имеет неограниченное количество попыток на проверку (кнопка Check).
  - В игре не должно быть таймера на победу — игра идёт до первого успешного решения.
  - При первом успешном прохождении тестов система должна заблокировать кнопку «Check» для победителя и вывести модальное окно уведомления для обоих игроков.
  - Проигравший должен иметь возможность продолжать редактирование и запуск тестов до момента нажатия кнопки «Exit».
  - Победитель должен иметь возможность остаться и смотреть на код.
  - Данные должны храниться до полного завершения сессии.
  - Сессия игры должна удаляться из активной памяти сервера (или помечаться как closed) только после того, как оба игрока нажали «Exit» или покинули страницу.
non-functional:
  - Система должна стабильно обрабатывать до 1000 одновременных пользователей без деградации времени отклика.
  - Задержка (latency) передачи изменений в коде между игроками не должна превышать 200–300 мс для комфортной игры.
  - Сайт должен корректно работать в последних версиях браузеров (Chrome, Firefox, Safari, Edge).
  - Интерфейс должен быть адаптивным для корректного отображения на смартфонах и планшетах.
  - Система должна защищать персональные данные пользователей и обеспечивать безопасную авторизацию.
  - Блок интерфейса задания должен быть сверху, время игры под ним, а чат слева.
  - Игра может длиться неограниченное время.
  - Выполнение пользовательского кода должно происходить в изолированной «песочнице», чтобы исключить вредоносное воздействие на сервер.
  - Тесты должны запускаться только на локальном коде, не на коде соперника.
  - Время отклика сервера на нажатие кнопки «Check» (компиляция и прогон тестов) не должно превышать 2-3 секунд для стандартных задач.
  - Переходы между состояниями игры (active -> finished -> closed) должны быть атомарными и синхронизированными для всех участников (игроков и зрителей).
  - Система матчинга должна выдерживать одновременный старт 100+ игровых сессий без задержек в создании WebSocket-каналов.
implicit:
  - Раз есть рейтинг и чат, подразумевается наличие системы регистрации, логина и восстановления пароля.
  - Очки рейтинга не должны «пропадать» или начисляться дважды за одну игру при обрыве соединения.
  - Кнопка запуска тестов должна быть заметной, а статус игры (кто победил, сколько времени осталось) — очевидным.
  - При падении интернет-соединения у одного из игроков система должна корректно уведомлять об этом второго участника, а не «зависать».
  - Если задача на русском, то и сообщения об ошибках тестов (где это возможно) или системные уведомления должны соответствовать выбранному языку.
  - Система должна позволять другим пользователям подключаться к активной игре в режиме зрителя.
  - Пользователь должен видеть индикатор статуса соединения (например, если WebSocket отвалился, должна появиться плашка «Reconnecting...»).
  - Код соперника в правом окне должен быть доступен только для чтения (Read-only). Игрок не должен иметь возможности программно или через консоль изменить чужой код.
  - При смене языка программирования во время боя система должна либо сохранять наработки на предыдущем языке, либо выводить предупреждение об очистке редактора.
  - Зрители, подключившиеся в середине боя, должны видеть актуальное состояние обоих редакторов, а не пустые окна.
